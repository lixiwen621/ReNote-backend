server:
  port: 8083

spring:
  application:
    name: renote-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/renote?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:lidengfu1993}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.renote.backend.mapper: debug

review:
  scheduler:
    delay-ms: 10000

notify:
  wechat:
    enabled: ${WECHAT_ENABLED:false}
    mock-success: ${WECHAT_MOCK_SUCCESS:true}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
