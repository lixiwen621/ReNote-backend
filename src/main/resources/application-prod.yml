# 生产环境（腾讯云等）
# 激活（任选其一）：
#   java -jar xxx.jar --spring.profiles.active=prod
#   或 export SPRING_PROFILES_ACTIVE=prod
#
# 必填：DB_USERNAME、DB_PASSWORD、JWT_SECRET（生产请用强随机串）
# 选填：WECHAT_*、CORS_ALLOWED_ORIGINS 等，不填则下面用空/0，避免沿用 application.yml 里的开发默认值

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://42.194.211.139:3306/renote?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:renote}
    password: ${DB_PASSWORD:lidengfu1993}

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.renote.backend.mapper: info

# 企业微信：应用消息发送 + 回调 URL 验签（与企微管理后台「自建应用」配置一致）
notify:
  wechat:
    # 是否走真实企业微信 API；false 时跳过发送（可用于无企微环境）
    enabled: ${WECHAT_ENABLED:true}
    # true 时不调企微接口、直接视为发送成功（仅联调/排查用，生产建议 false）
    mock-success: ${WECHAT_MOCK_SUCCESS:false}
    # 企业 ID（corpId，企微「我的企业」或应用详情页可见）
    corp-id: ${WECHAT_CORP_ID:ww341d4c208d81d852}
    # 自建应用 AgentId（整数，应用详情页）
    agent-id: ${WECHAT_AGENT_ID:1000002}
    # 应用 Secret（用于获取 access_token、发消息等，勿提交到公开仓库，建议仅用环境变量注入）
    secret: ${WECHAT_SECRET:qBthBZxIXcjPIAa6lX8fJ1CS_tc2Os0Lm60G2LWjHT8}
    # 回调 URL 上的 Token，与「接收消息」服务器配置中的 Token 一致，用于校验请求来源
    callback-token: ${WECHAT_CALLBACK_TOKEN:9zxodk8uX5H}
    # EncodingAESKey（43 字符），与回调「消息加解密」配置一致，用于解密/验签企业微信推送
    callback-encoding-aes-key: ${WECHAT_CALLBACK_ENCODING_AES_KEY:UCbIunAehFz9Itig0LtdMdbETGzFn9n6olbB9Kh3lXQ}

jwt:
  secret: ${JWT_SECRET:change-me-use-at-least-256-bits-for-hs256-in-production-please-change-now}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}

security:
  sql-injection:
    enabled: ${SQL_INJECTION_ENABLED:true}
    block: ${SQL_INJECTION_BLOCK:true}
