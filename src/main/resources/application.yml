# 默认（不激活任何 profile）：只加载本文件 application.yml。
# 激活 prod 时：application.yml + application-prod.yml（后者覆盖同名项）。
# 本地个人覆盖：复制 application-local.yml.example 为 application-local.yml（已 .gitignore），激活 local。
# 组合示例：spring.profiles.active=prod,local → 先 prod 再 local，local 覆盖 prod。
# 切换方式示例：
#   prod：mvn spring-boot:run -Dspring-boot.run.profiles=prod  或  mvn spring-boot:run -Prun-prod（见 pom.xml <profiles>）
#   local：mvn spring-boot:run -Dspring-boot.run.profiles=local  或  -Prun-local
#   prod+local：mvn spring-boot:run -Dspring-boot.run.profiles=prod,local  或  -Prun-prod-local
#   JAR：java -jar xxx.jar --spring.profiles.active=prod
#   环境变量：export SPRING_PROFILES_ACTIVE=prod
#   IDE：Run Configuration → Active profiles 填 prod / local / prod,local（留空则仅本文件）

server:
  port: 8083

spring:
  application:
    name: renote-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/renote?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:lidengfu1993}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.renote.backend.mapper: info

review:
  scheduler:
    delay-ms: 10000

notify:
  wechat:
    enabled: ${WECHAT_ENABLED:true}
    mock-success: ${WECHAT_MOCK_SUCCESS:false}
    corp-id: ${WECHAT_CORP_ID:ww341d4c208d81d852}
    agent-id: ${WECHAT_AGENT_ID:1000002}
    secret: ${WECHAT_SECRET:qBthBZxIXcjPIAa6lX8fJ1CS_tc2Os0Lm60G2LWjHT8}
    callback-token: ${WECHAT_CALLBACK_TOKEN:9zxodk8uX5H}
    callback-encoding-aes-key: ${WECHAT_CALLBACK_ENCODING_AES_KEY:UCbIunAehFz9Itig0LtdMdbETGzFn9n6olbB9Kh3lXQ}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}

jwt:
  secret: ${JWT_SECRET:change-me-use-at-least-256-bits-for-hs256-in-production-please-change-now}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

security:
  sql-injection:
    enabled: ${SQL_INJECTION_ENABLED:true}
    block: ${SQL_INJECTION_BLOCK:true}
